<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>Editör · Askerî Terimler Sözlüğü</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<style>
:root{--bg:#f8f8f6;--paper:#fff;--ink:#1e2732;--muted:#6c6861;--navy:#2f4e71;--red:#923c2c;--line:#deded8}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Cambria,Georgia,serif}.shell{width:min(980px,calc(100% - 28px));margin:auto;padding:22px 0 48px}
header{display:flex;align-items:center;justify-content:space-between;gap:18px;padding-bottom:16px;border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:12px;color:var(--ink);text-decoration:none;font-weight:700}.brand img{width:46px;height:46px}.back{color:var(--navy)}
.card{background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 44px -36px rgba(35,28,22,.5);padding:24px}.login{width:min(460px,100%);margin:72px auto}.login h1{margin:0 0 8px;color:#20395a}.login p{color:var(--muted);line-height:1.55}
label{display:block;color:#715d36;font:600 11px/1.2 Calibri,"Segoe UI",sans-serif;letter-spacing:.08em;text-transform:uppercase}.input{width:100%;margin-top:7px;border:1px solid #c8c8c2;border-radius:9px;background:#fff;color:var(--ink);padding:11px 12px;font:15px/1.45 Cambria,Georgia,serif}.input:focus{outline:0;border-color:#7f95ad;box-shadow:0 0 0 3px rgba(47,78,113,.09)}
button{width:100%;margin-top:14px;border:1px solid var(--navy);border-radius:9px;background:var(--navy);color:#fff;padding:11px 15px;font-weight:700;cursor:pointer}button:hover{background:#20395a}.error{color:var(--red);min-height:20px;margin-bottom:0}
</style>
</head>
<body><div class="shell">
<header><a class="brand" href="/"><img src="/ats-logo-2026.svg" alt="ATS"><span>Askerî Terimler Sözlüğü · Editör</span></a><a class="back" href="/">Sözlüğe dön</a></header>

<section id="loginPanel" class="card login">
  <h1>Editör girişi</h1>
  <p>Girişten sonra ana sözlüğe döneceksiniz. Bir maddeyi açıp <strong>Düzenle</strong> seçeneğiyle doğrudan canlı kayıt formuna geçebilirsiniz.</p>
  <form id="loginForm">
    <label>Parola<input id="password" class="input" type="password" autocomplete="current-password" required></label>
    <button type="submit">Giriş yap ve sözlüğe dön</button>
    <p id="loginError" class="error" role="alert"></p>
  </form>
</section>
</div>

<script>
const $=id=>document.getElementById(id);
async function readJson(response){let data={};try{data=await response.json()}catch{}if(!response.ok||!data.ok)throw new Error(data.error||('HTTP '+response.status));return data}
async function checkSession(){try{const response=await fetch('/api/editor/session',{headers:{Accept:'application/json'},credentials:'same-origin',cache:'no-store'});const data=await readJson(response);if(data.authenticated)location.replace('/')}catch{}}
$('loginForm').addEventListener('submit',async event=>{
  event.preventDefault();const button=event.submitter;$('loginError').textContent='';if(button)button.disabled=true;
  try{
    const response=await fetch('/api/editor/login',{method:'POST',credentials:'same-origin',headers:{Accept:'application/json','Content-Type':'application/json'},body:JSON.stringify({password:$('password').value})});
    await readJson(response);$('password').value='';location.replace('/');
  }catch(error){$('loginError').textContent=error.message==='rate_limited'?'Çok fazla deneme yapıldı. Lütfen bekleyin.':'Parola doğrulanamadı.';if(button)button.disabled=false}
});
checkSession();
</script>
</body>
</html>
