<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,follow">
<title>Oturum Aç · Askerî Terimler Sözlüğü</title><link rel="icon" href="/favicon.ico" sizes="any"><link rel="stylesheet" href="/assets/community-account.css">
</head>
<body data-mode="signin" data-lang="tr">
<div class="community-shell">
<header class="community-topbar"><a class="community-brand" href="/"><img src="/ats-logo-2026.svg" alt="ATS"></a><a class="community-back" href="/">Sözlüğe dön</a></header>
<main class="community-main narrow">
<h1 class="community-title">Oturum Aç</h1>
<p class="community-lead">Favorilerinize ve kişisel çalışma alanınıza ulaşın.</p>
<p class="public-good">Sözlüğü okumak için oturum açmanız gerekmez. Üyelik yalnız kişisel özellikler ve topluluk katkıları içindir.</p>
<section class="community-card">
<form id="signinForm">
<label class="community-field">E-posta<input id="email" type="email" autocomplete="email" required maxlength="254"></label>
<label class="community-field" style="margin-top:13px">Parola<input id="password" type="password" autocomplete="current-password" required maxlength="128"></label>
<div id="turnstileLogin" class="community-turnstile"></div>
<div class="community-actions"><button class="community-button primary" type="submit">Oturum aç</button><a class="community-button" href="/uye-ol/">Üye Ol</a></div>
</form>
<p id="communityStatus" class="community-status" role="status"></p>
<details class="community-details"><summary>E-posta doğrulamasını yeniden gönder</summary><form id="resendForm"><label class="community-field" style="margin-top:12px">E-posta<input id="resendEmail" type="email" required maxlength="254"></label><div id="turnstileResend" class="community-turnstile"></div><button class="community-button" type="submit">Doğrulama bağlantısı gönder</button></form></details>
<details class="community-details"><summary>Parolamı unuttum</summary><form id="resetRequestForm"><label class="community-field" style="margin-top:12px">E-posta<input id="resetEmail" type="email" required maxlength="254"></label><div id="turnstileResetRequest" class="community-turnstile"></div><button class="community-button" type="submit">Parola yenileme bağlantısı gönder</button></form></details>
</section>
</main>
<footer class="community-footer">© 2026 Askerî Terimler Sözlüğü</footer>
</div>
<script src="/assets/community-account.js" defer></script>
</body></html>
