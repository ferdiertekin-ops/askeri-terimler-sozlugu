[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm run build"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/content"
  to = "/.netlify/functions/content"
  status = 200
  force = true

[[redirects]]
  from = "/robots.txt"
  to = "/.netlify/functions/robots"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200
  force = true

[[redirects]]
  from = "/terimler"
  to = "/.netlify/functions/terms"
  status = 200
  force = true

[[redirects]]
  from = "/terimler/"
  to = "/.netlify/functions/terms"
  status = 200
  force = true

[[redirects]]
  from = "/terim/:slug"
  to = "/.netlify/functions/term?slug=:slug"
  status = 200
  force = true

[[redirects]]
  from = "/terim/:slug/"
  to = "/.netlify/functions/term?slug=:slug"
  status = 200
  force = true

