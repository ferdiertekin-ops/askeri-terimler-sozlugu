<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>D1 Sözlük Önizlemesi</title>
<style>
:root{--bg:#f4f0e7;--card:#fffefa;--ink:#1e2732;--soft:#626b76;--line:#d7d0c1;--accent:#2f4e71;--deep:#20395a;--danger:#8b3a32;--danger-soft:#f5ebe8;--danger-line:#d8beb8;--shadow:0 12px 30px -24px rgba(30,39,50,.45)}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(#f8f5ee,#ece7db);color:var(--ink);font-family:Cambria,Georgia,serif}.wrap{max-width:1180px;margin:auto;padding:28px 22px 64px}.head{text-align:center;padding:22px 0 24px}.head h1{margin:0;color:var(--deep);font:600 clamp(28px,4vw,46px) Palatino,Georgia,serif}.head p{margin:10px 0 0;color:var(--soft)}.panel{background:rgba(255,254,250,.92);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}.search{display:grid;grid-template-columns:1fr auto;gap:10px}.search input{min-height:44px;border:1px solid #aaa392;border-radius:9px;padding:0 14px;font-size:16px;background:#fff}.btn{min-height:42px;border:1px solid var(--line);border-radius:9px;padding:0 16px;background:#fff;color:var(--ink);font-weight:700}.btn.primary{background:var(--accent);border-color:var(--deep);color:#fff}.result-meta{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:18px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}.result-title{grid-column:2;display:inline-flex;align-items:center;justify-self:center;gap:14px;color:var(--danger);font:700 18px Palatino,Georgia,serif;letter-spacing:.02em;white-space:nowrap}.result-title::before,.result-title::after{content:"";display:block;width:52px;height:1px;background:rgba(139,58,50,.28)}.result-count{grid-column:3;justify-self:end;display:inline-flex;align-items:center;padding:7px 13px;border:1px solid var(--danger-line);border-radius:999px;background:var(--danger-soft);color:#6d453e;font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}.status{min-height:24px;margin:14px 0;color:var(--soft)}.status.error{color:var(--danger);font-weight:700}.list{display:grid;gap:11px}.row{position:relative;display:grid;grid-template-columns:1.25fr 1fr 1fr 1.35fr auto;gap:0;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:14px 14px 14px 16px;box-shadow:var(--shadow);cursor:pointer;align-items:start}.row:hover{border-color:var(--accent)}.cell{min-width:0;padding:0 18px;border-left:1px solid var(--line)}.cell:first-child{padding-left:0;border-left:0}.cell h2{margin:0;color:var(--ink);font:700 19px Palatino,Georgia,serif;line-height:1.28}.label{display:block;margin-bottom:5px;color:#7a6335;font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:700}.value{line-height:1.42;font-weight:600;white-space:pre-line}.explanation{font-weight:600}.open-entry{align-self:center;justify-self:end;width:36px;height:36px;border:1px solid #d8cfba;border-radius:50%;background:#f5f0e4;color:#647080;font-size:18px;line-height:1;padding:0;display:grid;place-items:center;cursor:pointer}.open-entry:hover{border-color:var(--accent);color:var(--deep);background:#fff}.pager{display:flex;justify-content:center;align-items:center;gap:14px;margin-top:20px}.drawer{position:fixed;inset:0;display:none;background:rgba(20,28,38,.38);padding:24px;z-index:10}.drawer.open{display:grid;place-items:center}.dialog{width:min(760px,100%);max-height:88vh;overflow:auto;background:var(--card);border-radius:14px;border:1px solid var(--line);box-shadow:0 28px 70px -25px #000;padding:22px}.dialog-head{display:flex;justify-content:space-between;gap:18px}.dialog h2{margin:0;color:var(--deep);font:700 30px Palatino,Georgia,serif}.close{border:0;background:transparent;font-size:28px}.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px}.box{border-top:1px solid var(--line);padding-top:12px}.box.full{grid-column:1/-1}.sources{padding-left:20px}.empty{text-align:center;padding:40px;color:var(--soft)}@media(max-width:900px){.row{grid-template-columns:1fr 1fr}.cell{border-left:0;border-top:1px solid var(--line);padding:12px 0 0;margin-top:12px}.cell:first-child,.cell:nth-child(2){border-top:0;padding-top:0;margin-top:0}.open-entry{position:absolute;right:12px;top:12px}.cell:first-child{padding-right:50px}}@media(max-width:700px){.search{grid-template-columns:1fr}.detail-grid{grid-template-columns:1fr}.box.full{grid-column:auto}.result-meta{grid-template-columns:1fr;justify-items:center;gap:10px}.result-title,.result-count{grid-column:auto;justify-self:center}.result-title::before,.result-title::after{width:30px}.result-title{white-space:normal;text-align:center}.row{grid-template-columns:1fr}.cell,.cell:nth-child(2){border-top:1px solid var(--line);padding:12px 0 0;margin-top:12px}.cell:first-child{border-top:0;padding-top:0;margin-top:0}}
</style>
</head>
<body>
<div class="wrap">
<header class="head"><h1>Askerî Terimler Sözlüğü</h1><p>D1 veri katmanı önizlemesi · yalnız yayımlanmış maddeler</p></header>
<section class="panel">
<form id="searchForm" class="search"><input id="query" type="search" placeholder="Terim ara…"><button class="btn primary">Ara</button></form>
<div class="result-meta"><span id="resultTitle" class="result-title">Sonuçlar</span><span id="meta" class="result-count">Yükleniyor…</span></div>
</section>
<p id="status" class="status" role="status"></p>
<main id="results" class="list"></main>
<div class="pager"><button id="prev" class="btn">Önceki</button><strong id="page">1 / 1</strong><button id="next" class="btn">Sonraki</button></div>
</div>
<div id="drawer" class="drawer" aria-hidden="true"><section class="dialog" role="dialog" aria-modal="true"><div class="dialog-head"><h2 id="detailTitle">Madde</h2><button id="close" class="close" aria-label="Kapat">×</button></div><div id="detail"></div></section></div>
<script>
(()=>{'use strict';
const LIMIT=30;let offset=0,total=0,currentQuery='',loading=false;
const el=id=>document.getElementById(id),results=el('results'),status=el('status'),meta=el('meta'),resultTitle=el('resultTitle'),page=el('page'),prev=el('prev'),next=el('next'),drawer=el('drawer');
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function setStatus(text,error=false){status.textContent=text;status.className='status'+(error?' error':'')}
function itemHtml(x){return `<article class="row" tabindex="0" data-slug="${esc(x.slug)}"><div class="cell"><span class="label">Ana Terim</span><h2>${esc(x.headword_en)||'—'}</h2></div><div class="cell"><span class="label">Osmanlıca / Dönem</span><div class="value">${esc(x.ottoman_period_term)||'—'}</div></div><div class="cell"><span class="label">Günümüz Karşılığı</span><div class="value">${esc(x.modern_equivalent_tr)||'—'}</div></div><div class="cell"><span class="label">Açıklama</span><div class="value explanation">${esc(x.explanation_tr)||'—'}</div></div><button type="button" class="open-entry" aria-label="Maddeyi aç">•••</button></article>`}
async function load(){if(loading)return;loading=true;setStatus('Maddeler yükleniyor…');prev.disabled=next.disabled=true;try{const u=new URL('/api/terms',location.origin);u.searchParams.set('limit',LIMIT);u.searchParams.set('offset',offset);if(currentQuery)u.searchParams.set('q',currentQuery);const r=await fetch(u,{headers:{Accept:'application/json'}});const d=await r.json();if(!r.ok||!d.ok)throw new Error(d.error||`HTTP ${r.status}`);total=d.total;results.innerHTML=d.items.length?d.items.map(itemHtml).join(''):'<div class="empty">Sonuç bulunamadı.</div>';const current=Math.floor(offset/LIMIT)+1,pages=Math.max(1,Math.ceil(total/LIMIT));page.textContent=`${current} / ${pages}`;resultTitle.textContent=currentQuery?`“${currentQuery}” için sonuçlar`:'Sonuçlar';meta.textContent=currentQuery?`${total} sonuç`:`${total} madde`;prev.disabled=!d.hasPrevious;next.disabled=!d.hasNext;setStatus(d.items.length?`${offset+1}–${Math.min(offset+d.items.length,total)} arası gösteriliyor.`:'');}catch(e){results.innerHTML='';resultTitle.textContent='Sonuçlar';meta.textContent='—';setStatus(`Yükleme başarısız: ${e.message}`,true)}finally{loading=false}}
async function detail(slug){setStatus('Madde ayrıntısı yükleniyor…');try{const r=await fetch(`/api/terms/${encodeURIComponent(slug)}`,{headers:{Accept:'application/json'}});const d=await r.json();if(!r.ok||!d.ok)throw new Error(d.error||`HTTP ${r.status}`);const t=d.term;el('detailTitle').textContent=t.headword_en;el('detail').innerHTML=`<div class="detail-grid"><div class="box"><span class="label">Osmanlıca / Dönem</span>${esc(t.ottoman_period_term)||'—'}</div><div class="box"><span class="label">Günümüz Karşılığı</span>${esc(t.modern_equivalent_tr)||'—'}</div><div class="box"><span class="label">Kategori</span>${esc(t.category)||'—'}</div><div class="box"><span class="label">Varyant / Kısaltma</span>${t.variants.length?t.variants.map(v=>esc(v.variant)).join(', '):'—'}</div><div class="box full"><span class="label">Açıklama</span>${esc(t.explanation_tr)||'—'}</div><div class="box full"><span class="label">Künye / Kaynak</span>${t.sources.length?`<ol class="sources">${t.sources.map(s=>`<li>${esc(s.citation)}</li>`).join('')}</ol>`:'—'}</div></div>`;drawer.classList.add('open');drawer.setAttribute('aria-hidden','false');setStatus('');}catch(e){setStatus(`Madde yüklenemedi: ${e.message}`,true)}}
el('searchForm').addEventListener('submit',e=>{e.preventDefault();currentQuery=el('query').value.trim();offset=0;load()});prev.addEventListener('click',()=>{offset=Math.max(0,offset-LIMIT);load();scrollTo({top:0,behavior:'smooth'})});next.addEventListener('click',()=>{offset+=LIMIT;load();scrollTo({top:0,behavior:'smooth'})});results.addEventListener('click',e=>{const row=e.target.closest('[data-slug]');if(row)detail(row.dataset.slug)});results.addEventListener('keydown',e=>{if((e.key==='Enter'||e.key===' ')&&e.target.matches('[data-slug]')){e.preventDefault();detail(e.target.dataset.slug)}});el('close').addEventListener('click',()=>{drawer.classList.remove('open');drawer.setAttribute('aria-hidden','true')});drawer.addEventListener('click',e=>{if(e.target===drawer)el('close').click()});load();
})();
</script>
</body>
</html>
