<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>D1 Sözlük Önizlemesi</title>
<style>
:root{--bg:#f4f0e7;--card:#fffefa;--ink:#1e2732;--soft:#626b76;--line:#d7d0c1;--accent:#2f4e71;--deep:#20395a;--danger:#8b3a32;--danger-soft:#f5ebe8;--danger-line:#d8beb8;--shadow:0 12px 30px -24px rgba(30,39,50,.45)}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(#f8f5ee,#ece7db);color:var(--ink);font-family:Cambria,Georgia,serif}.wrap{max-width:1180px;margin:auto;padding:28px 22px 64px}.head{text-align:center;padding:22px 0 24px}.head h1{margin:0;color:var(--deep);font:600 clamp(28px,4vw,46px) Palatino,Georgia,serif}.head p{margin:10px 0 0;color:var(--soft)}.panel{background:rgba(255,254,250,.92);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}.search{display:grid;grid-template-columns:1fr auto;gap:10px}.search input{min-height:44px;border:1px solid #aaa392;border-radius:9px;padding:0 14px;font-size:16px;background:#fff;font-family:Cambria,Georgia,serif}.btn{min-height:42px;border:1px solid var(--line);border-radius:9px;padding:0 16px;background:#fff;color:var(--ink);font-weight:700}.btn.primary{background:var(--accent);border-color:var(--deep);color:#fff}.result-meta{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:18px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}.result-title{grid-column:2;display:inline-flex;align-items:center;justify-self:center;gap:14px;color:var(--danger);font:700 18px Palatino,Georgia,serif;letter-spacing:.02em;white-space:nowrap}.result-title::before,.result-title::after{content:"";display:block;width:52px;height:1px;background:rgba(139,58,50,.28)}.result-count{grid-column:3;justify-self:end;display:inline-flex;align-items:center;padding:7px 13px;border:1px solid var(--danger-line);border-radius:999px;background:var(--danger-soft);color:#6d453e;font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}.status{min-height:18px;margin:10px 0;color:var(--soft);font-size:13px}.status.error{color:var(--danger);font-weight:700}.list{display:grid;gap:8px}.row{position:relative;display:grid;grid-template-columns:minmax(0,1.25fr) minmax(0,1fr) minmax(0,1fr) minmax(0,1.45fr) auto;gap:0;background:linear-gradient(180deg,#fffefa 0%,#fffdf8 100%);border:1px solid #ddd6c7;border-radius:10px;padding:11px 12px 11px 14px;box-shadow:0 1px 2px rgba(30,39,50,.025),0 8px 18px -20px rgba(30,39,50,.34);cursor:pointer;align-items:start;transform:translateY(0);transition:transform .16s cubic-bezier(.2,.7,.3,1),box-shadow .16s ease,border-color .16s ease,background .16s ease}.row::before{content:"";position:absolute;inset:0 auto 0 0;width:3px;border-radius:10px 0 0 10px;background:linear-gradient(180deg,var(--danger),var(--accent));opacity:.42;transform:scaleY(.82);transition:opacity .16s ease,transform .16s ease}.row:hover,.row:focus-visible{transform:translateY(-1px);border-color:rgba(47,78,113,.38);background:linear-gradient(180deg,#fffefa 0%,#fbf8f0 100%);box-shadow:0 3px 8px rgba(30,39,50,.065),0 17px 30px -24px rgba(32,57,90,.44)}.row:hover::before,.row:focus-visible::before{opacity:1;transform:scaleY(1)}.row:focus-visible{outline:2px solid rgba(47,78,113,.4);outline-offset:2px}.cell{min-width:0;max-width:100%;overflow:hidden;padding:0 15px;border-left:1px solid rgba(200,194,177,.7)}.cell:first-child{padding-left:0;border-left:0}.cell h2{margin:0;color:var(--ink);font:600 17px/1.25 Palatino,Georgia,serif;letter-spacing:-.005em;transition:color .16s ease;overflow-wrap:anywhere;word-break:normal;hyphens:auto}.row:hover .cell h2,.row:focus-visible .cell h2{color:var(--deep)}.label{display:block;margin-bottom:4px;color:#7a6335;font-size:9.5px;text-transform:uppercase;letter-spacing:.095em;font-weight:700}.value{max-width:100%;font-family:Cambria,Georgia,serif;font-size:14px;line-height:1.34;font-weight:600;white-space:pre-line;overflow-wrap:anywhere;word-break:normal;hyphens:auto;color:#202a35}.explanation{font-weight:600;text-align:justify;text-align-last:left;hyphens:auto;letter-spacing:.001em}.open-entry{align-self:center;justify-self:end;width:32px;height:32px;border:1px solid #d8cfba;border-radius:50%;background:#f5f0e4;color:#647080;font-size:16px;line-height:1;padding:0;display:grid;place-items:center;cursor:pointer;transition:transform .16s ease,border-color .16s ease,color .16s ease,background .16s ease,box-shadow .16s ease}.row:hover .open-entry,.row:focus-visible .open-entry,.open-entry:hover{transform:translateX(-1px);border-color:rgba(47,78,113,.5);color:var(--deep);background:#fff;box-shadow:0 4px 12px -8px rgba(32,57,90,.55)}.pager{display:flex;justify-content:center;align-items:center;gap:14px;margin-top:18px}.drawer{position:fixed;inset:0;display:none;background:rgba(20,28,38,.42);padding:18px;z-index:10}.drawer.open{display:grid;place-items:center}.dialog{width:min(980px,100%);max-height:92vh;overflow:auto;background:linear-gradient(180deg,#f8f4eb 0%,#f1ebdf 100%);border-radius:16px;border:1px solid #cfc7b6;box-shadow:0 30px 80px -28px rgba(0,0,0,.55);padding:0}.dialog-head{position:sticky;top:0;z-index:2;display:flex;justify-content:space-between;align-items:flex-start;gap:20px;padding:16px 20px 14px;background:rgba(255,254,250,.96);border-bottom:1px solid #c9c1af;backdrop-filter:blur(8px)}.dialog-kicker{display:block;margin-bottom:4px;color:#7a6335;font-size:10px;text-transform:uppercase;letter-spacing:.13em;font-weight:700}.dialog h2{margin:0;color:var(--ink);font:600 27px/1.15 Palatino,Georgia,serif}.close{flex:0 0 auto;width:38px;height:38px;border:1px solid #d5ccb8;border-radius:50%;background:#f6f1e6;color:#394552;font-size:22px;line-height:1;cursor:pointer}.close:hover{background:#fff;border-color:var(--accent);color:var(--deep)}.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:18px}.detail-card{position:relative;min-width:0;background:rgba(255,254,250,.92);border:1px solid #ded6c7;border-radius:13px;padding:14px 16px 15px;box-shadow:0 1px 2px rgba(30,39,50,.03),0 10px 24px -22px rgba(30,39,50,.3);overflow-wrap:anywhere}.detail-card::before{content:"";position:absolute;left:0;top:12px;bottom:12px;width:2px;border-radius:0 2px 2px 0;background:linear-gradient(180deg,#b18a45,var(--accent));opacity:.6}.detail-card.full{grid-column:1/-1}.detail-value{font-family:Cambria,Georgia,serif;font-size:15px;line-height:1.5;font-weight:600;color:#202a35;white-space:pre-line}.detail-card.description .detail-value{text-align:justify;text-align-last:left;font-weight:600}.sources{margin:0;padding-left:20px}.sources li{margin:5px 0;line-height:1.45}.source-link{color:var(--deep);text-decoration:none}.source-link:hover{text-decoration:underline}.empty{text-align:center;padding:40px;color:var(--soft)}
@media(max-width:900px){.row{grid-template-columns:minmax(0,1fr) minmax(0,1fr)}.cell{border-left:0;border-top:1px solid var(--line);padding:10px 0 0;margin-top:10px}.cell:first-child,.cell:nth-child(2){border-top:0;padding-top:0;margin-top:0}.open-entry{position:absolute;right:10px;top:10px}.cell:first-child{padding-right:46px}}
@media(max-width:700px){.search{grid-template-columns:1fr}.result-meta{grid-template-columns:1fr;justify-items:center;gap:10px}.result-title,.result-count{grid-column:auto;justify-self:center}.result-title::before,.result-title::after{width:30px}.result-title{white-space:normal;text-align:center}.row{grid-template-columns:minmax(0,1fr)}.cell,.cell:nth-child(2){border-top:1px solid var(--line);padding:10px 0 0;margin-top:10px}.cell:first-child{border-top:0;padding-top:0;margin-top:0}.drawer{padding:0}.dialog{width:100%;max-height:100vh;border-radius:0}.detail-grid{grid-template-columns:1fr;padding:12px;gap:10px}.detail-card.full{grid-column:auto}.dialog-head{padding:14px 15px}.dialog h2{font-size:23px}}
@media(prefers-reduced-motion:reduce){.row,.row::before,.cell h2,.open-entry{transition:none}.row:hover,.row:focus-visible{transform:none}}
</style>
</head>
<body>
<div class="wrap">
<header class="head"><h1>Askerî Terimler Sözlüğü</h1><p>D1 veri katmanı önizlemesi · yalnız yayımlanmış maddeler</p></header>
<section class="panel">
<form id="searchForm" class="search"><input id="query" type="search" placeholder="Terim ara…" autocomplete="off"><button class="btn primary">Ara</button></form>
<div class="result-meta"><span id="resultTitle" class="result-title">Sonuçlar</span><span id="meta" class="result-count">Yükleniyor…</span></div>
</section>
<p id="status" class="status" role="status"></p>
<main id="results" class="list"></main>
<div class="pager"><button id="prev" class="btn">Önceki</button><strong id="page">1 / 1</strong><button id="next" class="btn">Sonraki</button></div>
</div>
<div id="drawer" class="drawer" aria-hidden="true"><section class="dialog" role="dialog" aria-modal="true" aria-labelledby="detailTitle"><div class="dialog-head"><div><span class="dialog-kicker">Ana Sözlük</span><h2 id="detailTitle">Madde</h2></div><button id="close" class="close" aria-label="Kapat">×</button></div><div id="detail"></div></section></div>
<script>
(()=>{'use strict';
const LIMIT=30;let offset=0,total=0,currentQuery='',loading=false,searchTimer=null,requestToken=0;
const el=id=>document.getElementById(id),queryInput=el('query'),results=el('results'),status=el('status'),meta=el('meta'),resultTitle=el('resultTitle'),page=el('page'),prev=el('prev'),next=el('next'),drawer=el('drawer');
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function setStatus(text,error=false){status.textContent=text;status.className='status'+(error?' error':'')}
function itemHtml(x){return `<article class="row" tabindex="0" data-slug="${esc(x.slug)}"><div class="cell"><span class="label">Ana Terim</span><h2>${esc(x.headword_en)||'—'}</h2></div><div class="cell"><span class="label">Osmanlıca / Dönem</span><div class="value">${esc(x.ottoman_period_term)||'—'}</div></div><div class="cell"><span class="label">Günümüz Karşılığı</span><div class="value">${esc(x.modern_equivalent_tr)||'—'}</div></div><div class="cell"><span class="label">Açıklama</span><div class="value explanation">${esc(x.explanation_tr)||'—'}</div></div><button type="button" class="open-entry" aria-label="Maddeyi aç">•••</button></article>`}
async function load(){const token=++requestToken;if(loading)setStatus('Maddeler güncelleniyor…');else setStatus('Maddeler yükleniyor…');loading=true;prev.disabled=next.disabled=true;try{const u=new URL('/api/terms',location.origin);u.searchParams.set('limit',LIMIT);u.searchParams.set('offset',offset);if(currentQuery)u.searchParams.set('q',currentQuery);const r=await fetch(u,{headers:{Accept:'application/json'}});const d=await r.json();if(token!==requestToken)return;if(!r.ok||!d.ok)throw new Error(d.error||`HTTP ${r.status}`);total=d.total;results.innerHTML=d.items.length?d.items.map(itemHtml).join(''):'<div class="empty">Sonuç bulunamadı.</div>';const current=Math.floor(offset/LIMIT)+1,pages=Math.max(1,Math.ceil(total/LIMIT));page.textContent=`${current} / ${pages}`;resultTitle.textContent=currentQuery?`“${currentQuery}” için sonuçlar`:'Sonuçlar';meta.textContent=currentQuery?`${total} sonuç`:`${total} madde`;prev.disabled=!d.hasPrevious;next.disabled=!d.hasNext;setStatus(d.items.length?`${offset+1}–${Math.min(offset+d.items.length,total)} arası gösteriliyor.`:'');}catch(e){if(token!==requestToken)return;results.innerHTML='';resultTitle.textContent='Sonuçlar';meta.textContent='—';setStatus(`Yükleme başarısız: ${e.message}`,true)}finally{if(token===requestToken)loading=false}}
function sourceHtml(s){const citation=esc(s.citation||'');const url=String(s.url||'').trim();return url?`<li><a class="source-link" href="${esc(url)}" target="_blank" rel="noopener noreferrer">${citation||esc(url)}</a></li>`:`<li>${citation||'—'}</li>`}
async function detail(slug){setStatus('Madde ayrıntısı yükleniyor…');try{const r=await fetch(`/api/terms/${encodeURIComponent(slug)}`,{headers:{Accept:'application/json'}});const d=await r.json();if(!r.ok||!d.ok)throw new Error(d.error||`HTTP ${r.status}`);const t=d.term;el('detailTitle').textContent=t.headword_en;el('detail').innerHTML=`<div class="detail-grid"><div class="detail-card"><span class="label">Harf</span><div class="detail-value">${esc(t.letter)||'—'}</div></div><div class="detail-card"><span class="label">Madde Başı</span><div class="detail-value">${esc(t.headword_en)||'—'}</div></div><div class="detail-card"><span class="label">Varyant / Kısaltma</span><div class="detail-value">${t.variants?.length?t.variants.map(v=>esc(v.variant)).join(', '):'—'}</div></div><div class="detail-card"><span class="label">Osmanlıca / Dönem Karşılığı</span><div class="detail-value">${esc(t.ottoman_period_term)||'—'}</div></div><div class="detail-card"><span class="label">Günümüz Karşılığı</span><div class="detail-value">${esc(t.modern_equivalent_tr)||'—'}</div></div><div class="detail-card"><span class="label">Kategori</span><div class="detail-value">${esc(t.category)||'—'}</div></div><div class="detail-card full description"><span class="label">Açıklama</span><div class="detail-value">${esc(t.explanation_tr)||'—'}</div></div><div class="detail-card full"><span class="label">Künye / Kaynak</span><div class="detail-value">${t.sources?.length?`<ol class="sources">${t.sources.map(sourceHtml).join('')}</ol>`:'—'}</div></div></div>`;drawer.classList.add('open');drawer.setAttribute('aria-hidden','false');document.body.style.overflow='hidden';setStatus('');}catch(e){setStatus(`Madde yüklenemedi: ${e.message}`,true)}}
function closeDrawer(){drawer.classList.remove('open');drawer.setAttribute('aria-hidden','true');document.body.style.overflow=''}
function runSearch(){clearTimeout(searchTimer);currentQuery=queryInput.value.trim();offset=0;load()}
el('searchForm').addEventListener('submit',e=>{e.preventDefault();runSearch()});queryInput.addEventListener('input',()=>{clearTimeout(searchTimer);searchTimer=setTimeout(runSearch,260)});prev.addEventListener('click',()=>{offset=Math.max(0,offset-LIMIT);load();scrollTo({top:0,behavior:'smooth'})});next.addEventListener('click',()=>{offset+=LIMIT;load();scrollTo({top:0,behavior:'smooth'})});results.addEventListener('click',e=>{const row=e.target.closest('[data-slug]');if(row)detail(row.dataset.slug)});results.addEventListener('keydown',e=>{if((e.key==='Enter'||e.key===' ')&&e.target.matches('[data-slug]')){e.preventDefault();detail(e.target.dataset.slug)}});el('close').addEventListener('click',closeDrawer);drawer.addEventListener('click',e=>{if(e.target===drawer)closeDrawer()});document.addEventListener('keydown',e=>{if(e.key==='Escape'&&drawer.classList.contains('open'))closeDrawer()});load();
})();
</script>
</body>
</html>
