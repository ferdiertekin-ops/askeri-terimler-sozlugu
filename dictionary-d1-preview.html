<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>D1 Sözlük Önizlemesi</title>
<style>
:root{--paper:#fbfaf7;--paper-2:#f5f2ec;--ink:#1b1916;--muted:#706b64;--line:#ddd9d2;--line-soft:#ebe8e2;--accent:#9a3d20;--accent-soft:#f4ebe6;--rank:#158067;--org:#b64b25;--institution:#216bb1;--diplomacy:#a17820;--operation:#68469a;--weapon:#686868;--shadow:0 14px 34px -31px rgba(35,28,22,.42)}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(#faf9f6,#f1eee8);color:var(--ink);font-family:Cambria,Georgia,serif}.wrap{max-width:1180px;margin:auto;padding:28px 22px 64px}.head{text-align:center;padding:22px 0 24px}.head h1{margin:0;color:#25211d;font:600 clamp(28px,4vw,46px) Cambria,Georgia,serif}.head p{margin:10px 0 0;color:var(--muted)}.panel{background:rgba(251,250,247,.95);border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:var(--shadow)}.search{display:grid;grid-template-columns:1fr auto;gap:10px}.search input{min-height:42px;border:1px solid #b8b3ab;border-radius:8px;padding:0 14px;font:15px Cambria,Georgia,serif;background:#fff;color:var(--ink)}.btn{min-height:40px;border:1px solid var(--line);border-radius:8px;padding:0 16px;background:#fff;color:var(--ink);font-family:Cambria,Georgia,serif;font-weight:700}.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.result-meta{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:18px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}.result-title{grid-column:2;display:inline-flex;align-items:center;justify-self:center;gap:14px;color:var(--accent);font:700 17px Cambria,Georgia,serif;letter-spacing:.02em;white-space:nowrap}.result-title::before,.result-title::after{content:"";display:block;width:50px;height:1px;background:rgba(154,61,32,.28)}.result-count{grid-column:3;justify-self:end;padding:6px 12px;border:1px solid #decac1;border-radius:999px;background:var(--accent-soft);color:#67453b;font-size:13px;font-weight:700;white-space:nowrap}.status{min-height:17px;margin:9px 0;color:var(--muted);font-size:12.5px}.status.error{color:var(--accent);font-weight:700}.list-shell{overflow:hidden;border:1px solid var(--line);border-radius:9px;background:var(--paper);box-shadow:var(--shadow)}.list-head,.row{display:grid;grid-template-columns:minmax(0,1.16fr) minmax(0,1.12fr) minmax(0,.9fr) minmax(0,1.52fr) 38px}.list-head{align-items:center;min-height:37px;padding:0 10px 0 17px;background:#faf9f6;border-bottom:1px solid var(--line)}.list-head span{padding:0 13px;color:#918b83;font:600 10px/1.2 Cambria,Georgia,serif;font-variant:small-caps;letter-spacing:.13em}.list-head span:first-child{padding-left:0}.list-head .head-actions{padding:0}.list{background:var(--paper)}.row{position:relative;align-items:start;min-height:82px;padding:17px 10px 17px 17px;background:transparent;border-left:3px solid var(--section-color,var(--accent));border-bottom:1px solid var(--line);cursor:pointer;transition:background .15s ease}.row:last-child{border-bottom:0}.row:nth-child(even){background:rgba(62,55,47,.012)}.row:hover,.row:focus-visible{background:#f1f2ee}.row:focus-visible{outline:2px solid rgba(154,61,32,.25);outline-offset:-2px}.row.cat-rank{--section-color:var(--rank)}.row.cat-org{--section-color:var(--org)}.row.cat-institution{--section-color:var(--institution)}.row.cat-diplomacy{--section-color:var(--diplomacy)}.row.cat-operation{--section-color:var(--operation)}.row.cat-weapon{--section-color:var(--weapon)}.cell{min-width:0;max-width:100%;padding:0 13px}.cell:first-child{padding-left:0}.cell h2{margin:0;color:var(--ink);font:600 16px/1.35 Cambria,Georgia,serif;overflow-wrap:anywhere}.label-row{display:flex;align-items:center;gap:6px}.label{display:none}.value{max-width:100%;color:var(--ink);font:15px/1.48 Cambria,Georgia,serif;font-weight:400;white-space:pre-line;overflow-wrap:anywhere;hyphens:auto}.cell-ottoman .value{font-size:17px;font-style:italic}.cell-modern .value{font-family:Calibri,"Segoe UI",Arial,sans-serif;font-size:15px;font-style:normal}.cell-explanation .value{font-family:Calibri,"Segoe UI",Arial,sans-serif;font-size:14px;line-height:1.6;color:#5a5650;font-weight:400}.explanation{text-align:left;hyphens:auto}.speak{width:22px;height:22px;border:0;border-radius:50%;background:transparent;color:#9a9a96;display:inline-grid;place-items:center;padding:0;cursor:pointer;font-size:12px;line-height:1;transition:background .15s ease,color .15s ease}.speak:hover,.speak:focus-visible{background:#ece9e3;color:var(--accent)}.speak[aria-pressed="true"]{background:var(--accent);color:#fff}.no-speech .speak{display:none}.open-entry{align-self:center;justify-self:end;width:28px;height:28px;border:0;border-radius:50%;background:transparent;color:#8d8983;font-size:15px;line-height:1;padding:0;display:grid;place-items:center;cursor:pointer}.open-entry:hover{color:var(--accent);background:#eeeae4}.pager{display:flex;justify-content:center;align-items:center;gap:14px;margin-top:18px}.drawer{position:fixed;inset:0;display:none;background:rgba(20,18,16,.42);padding:18px;z-index:10}.drawer.open{display:grid;place-items:center}.dialog{width:min(980px,100%);max-height:92vh;overflow:auto;background:linear-gradient(180deg,#faf9f6,#f1eee8);border-radius:14px;border:1px solid #cbc5ba;box-shadow:0 30px 80px -28px rgba(0,0,0,.55)}.dialog-head{position:sticky;top:0;z-index:2;display:flex;justify-content:space-between;align-items:flex-start;gap:20px;padding:16px 20px 14px;background:rgba(251,250,247,.97);border-bottom:1px solid #cfc9bf}.dialog-kicker{display:block;margin-bottom:4px;color:var(--accent);font:700 10px Calibri,"Segoe UI",Arial,sans-serif;text-transform:uppercase;letter-spacing:.13em}.dialog h2{margin:0;color:var(--ink);font:600 27px/1.15 Cambria,Georgia,serif}.close{width:38px;height:38px;border:1px solid #d5cec2;border-radius:50%;background:#f6f2eb;color:#4a4641;font-size:22px;cursor:pointer}.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:18px}.detail-card{position:relative;min-width:0;background:rgba(251,250,247,.95);border:1px solid var(--line);border-radius:10px;padding:13px 15px;overflow-wrap:anywhere}.detail-card::before{content:"";position:absolute;left:0;top:10px;bottom:10px;width:2px;background:var(--accent);opacity:.62}.detail-card.full{grid-column:1/-1}.detail-card .label{display:block;margin-bottom:6px;color:#8c867f;font:600 10px Calibri,"Segoe UI",Arial,sans-serif;text-transform:uppercase;letter-spacing:.1em}.detail-card .label-row .label{margin-bottom:0}.detail-value{font-family:Cambria,Georgia,serif;font-size:15px;line-height:1.5;font-weight:500;color:var(--ink);white-space:pre-line}.detail-card.ottoman .detail-value{font-size:17px;font-style:italic}.detail-card.modern .detail-value{font-family:Calibri,"Segoe UI",Arial,sans-serif;font-size:15px}.detail-card.description .detail-value{font-family:Calibri,"Segoe UI",Arial,sans-serif;font-size:14px;color:#57534d;text-align:left;font-weight:400}.sources{margin:0;padding-left:20px}.sources li{margin:5px 0;line-height:1.45}.source-link{color:var(--accent);text-decoration:none}.source-link:hover{text-decoration:underline}.empty{text-align:center;padding:40px;color:var(--muted)}
@media(max-width:900px){.list-head{display:none}.row{grid-template-columns:minmax(0,1fr) minmax(0,1fr);min-height:0;padding:14px 12px 14px 15px}.cell{padding:0}.cell:nth-child(even){padding-left:16px}.cell-explanation{grid-column:1/-1;padding:12px 0 0!important;margin-top:12px;border-top:1px solid var(--line-soft)}.open-entry{position:absolute;right:10px;top:10px}.cell:first-child{padding-right:46px}.label{display:block;margin-bottom:4px;color:#918b83;font:600 9.5px Calibri,"Segoe UI",Arial,sans-serif;text-transform:uppercase;letter-spacing:.1em}.label-row{margin-bottom:4px}}
@media(max-width:700px){.search{grid-template-columns:1fr}.result-meta{grid-template-columns:1fr;justify-items:center;gap:10px}.result-title,.result-count{grid-column:auto;justify-self:center}.result-title::before,.result-title::after{width:30px}.result-title{white-space:normal;text-align:center}.row{grid-template-columns:minmax(0,1fr)}.cell,.cell:nth-child(even){padding:0}.cell{border-top:1px solid var(--line-soft);padding-top:10px!important;margin-top:10px}.cell:first-child{border-top:0;padding-top:0!important;margin-top:0;padding-right:42px!important}.cell-explanation{grid-column:auto}.drawer{padding:0}.dialog{width:100%;max-height:100vh;border-radius:0}.detail-grid{grid-template-columns:1fr;padding:12px;gap:10px}.detail-card.full{grid-column:auto}.dialog-head{padding:14px 15px}.dialog h2{font-size:23px}}
@media(prefers-reduced-motion:reduce){.row,.speak{transition:none}}
</style>
</head>
<body>
<div class="wrap">
<header class="head"><h1>Askerî Terimler Sözlüğü</h1><p>D1 veri katmanı önizlemesi · yalnız yayımlanmış maddeler</p></header>
<section class="panel">
<form id="searchForm" class="search"><input id="query" type="search" placeholder="Terim ara…" autocomplete="off"><button class="btn primary">Ara</button></form>
<div class="result-meta"><span id="resultTitle" class="result-title">Sonuçlar</span><span id="meta" class="result-count">Yükleniyor…</span></div>
</section>
<p id="status" class="status" role="status"></p>
<section class="list-shell">
<div class="list-head" aria-hidden="true"><span>Ana Terim</span><span>Osmanlıca / Dönem</span><span>Günümüz</span><span>Açıklama</span><span class="head-actions"></span></div>
<main id="results" class="list"></main>
</section>
<div class="pager"><button id="prev" class="btn">Önceki</button><strong id="page">1 / 1</strong><button id="next" class="btn">Sonraki</button></div>
</div>
<div id="drawer" class="drawer" aria-hidden="true"><section class="dialog" role="dialog" aria-modal="true" aria-labelledby="detailTitle"><div class="dialog-head"><div><span class="dialog-kicker">Ana Sözlük</span><h2 id="detailTitle">Madde</h2></div><button id="close" class="close" aria-label="Kapat">×</button></div><div id="detail"></div></section></div>
<script>
(()=>{'use strict';
const LIMIT=30;let offset=0,total=0,currentQuery='',loading=false,searchTimer=null,requestToken=0,activeSpeakButton=null;
const el=id=>document.getElementById(id),queryInput=el('query'),results=el('results'),status=el('status'),meta=el('meta'),resultTitle=el('resultTitle'),page=el('page'),prev=el('prev'),next=el('next'),drawer=el('drawer');
const speechSupported='speechSynthesis'in window&&'SpeechSynthesisUtterance'in window;if(!speechSupported)document.documentElement.classList.add('no-speech');
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const speakButton=(text,lang,label)=>text&&text!=='—'?`<button type="button" class="speak" data-speak="${esc(text)}" data-lang="${lang}" aria-label="${esc(label)}" title="${esc(label)}">🔊</button>`:'';
const labelHtml=(label,text,lang)=>`<div class="label-row"><span class="label">${label}</span>${speakButton(text,lang,`${label} alanını seslendir`)}</div>`;
function setStatus(text,error=false){status.textContent=text;status.className='status'+(error?' error':'')}
function categoryClass(category){const c=String(category||'').toLocaleLowerCase('tr-TR');if(c.includes('rütbe'))return'cat-rank';if(c.includes('teşkil'))return'cat-org';if(c.includes('kurum'))return'cat-institution';if(c.includes('diplom'))return'cat-diplomacy';if(c.includes('harek'))return'cat-operation';if(c.includes('silah'))return'cat-weapon';return''}
function itemHtml(x){return `<article class="row ${categoryClass(x.category)}" tabindex="0" data-slug="${esc(x.slug)}"><div class="cell">${labelHtml('Ana Terim',x.headword_en,'en-GB')}<h2>${esc(x.headword_en)||'—'}</h2></div><div class="cell cell-ottoman">${labelHtml('Osmanlıca / Dönem',x.ottoman_period_term,'tr-TR')}<div class="value">${esc(x.ottoman_period_term)||'—'}</div></div><div class="cell cell-modern">${labelHtml('Günümüz Karşılığı',x.modern_equivalent_tr,'tr-TR')}<div class="value">${esc(x.modern_equivalent_tr)||'—'}</div></div><div class="cell cell-explanation"><span class="label">Açıklama</span><div class="value explanation">${esc(x.explanation_tr)||'—'}</div></div><button type="button" class="open-entry" aria-label="Maddeyi aç">•••</button></article>`}
async function load(){const token=++requestToken;if(loading)setStatus('Maddeler güncelleniyor…');else setStatus('Maddeler yükleniyor…');loading=true;prev.disabled=next.disabled=true;try{const u=new URL('/api/terms',location.origin);u.searchParams.set('limit',LIMIT);u.searchParams.set('offset',offset);if(currentQuery)u.searchParams.set('q',currentQuery);const r=await fetch(u,{headers:{Accept:'application/json'}});const d=await r.json();if(token!==requestToken)return;if(!r.ok||!d.ok)throw new Error(d.error||`HTTP ${r.status}`);total=d.total;results.innerHTML=d.items.length?d.items.map(itemHtml).join(''):'<div class="empty">Sonuç bulunamadı.</div>';const current=Math.floor(offset/LIMIT)+1,pages=Math.max(1,Math.ceil(total/LIMIT));page.textContent=`${current} / ${pages}`;resultTitle.textContent=currentQuery?`“${currentQuery}” için sonuçlar`:'Sonuçlar';meta.textContent=currentQuery?`${total} sonuç`:`${total} madde`;prev.disabled=!d.hasPrevious;next.disabled=!d.hasNext;setStatus(d.items.length?`${offset+1}–${Math.min(offset+d.items.length,total)} arası gösteriliyor.`:'');}catch(e){if(token!==requestToken)return;results.innerHTML='';resultTitle.textContent='Sonuçlar';meta.textContent='—';setStatus(`Yükleme başarısız: ${e.message}`,true)}finally{if(token===requestToken)loading=false}}
function sourceHtml(s){const citation=esc(s.citation||'');const url=String(s.url||'').trim();return url?`<li><a class="source-link" href="${esc(url)}" target="_blank" rel="noopener noreferrer">${citation||esc(url)}</a></li>`:`<li>${citation||'—'}</li>`}
async function detail(slug){setStatus('Madde ayrıntısı yükleniyor…');try{const r=await fetch(`/api/terms/${encodeURIComponent(slug)}`,{headers:{Accept:'application/json'}});const d=await r.json();if(!r.ok||!d.ok)throw new Error(d.error||`HTTP ${r.status}`);const t=d.term;el('detailTitle').textContent=t.headword_en;el('detail').innerHTML=`<div class="detail-grid"><div class="detail-card"><span class="label">Harf</span><div class="detail-value">${esc(t.letter)||'—'}</div></div><div class="detail-card">${labelHtml('Madde Başı',t.headword_en,'en-GB')}<div class="detail-value">${esc(t.headword_en)||'—'}</div></div><div class="detail-card"><span class="label">Varyant / Kısaltma</span><div class="detail-value">${t.variants?.length?t.variants.map(v=>esc(v.variant)).join(', '):'—'}</div></div><div class="detail-card ottoman">${labelHtml('Osmanlıca / Dönem Karşılığı',t.ottoman_period_term,'tr-TR')}<div class="detail-value">${esc(t.ottoman_period_term)||'—'}</div></div><div class="detail-card modern">${labelHtml('Günümüz Karşılığı',t.modern_equivalent_tr,'tr-TR')}<div class="detail-value">${esc(t.modern_equivalent_tr)||'—'}</div></div><div class="detail-card"><span class="label">Kategori</span><div class="detail-value">${esc(t.category)||'—'}</div></div><div class="detail-card full description"><span class="label">Açıklama</span><div class="detail-value">${esc(t.explanation_tr)||'—'}</div></div><div class="detail-card full"><span class="label">Künye / Kaynak</span><div class="detail-value">${t.sources?.length?`<ol class="sources">${t.sources.map(sourceHtml).join('')}</ol>`:'—'}</div></div></div>`;drawer.classList.add('open');drawer.setAttribute('aria-hidden','false');document.body.style.overflow='hidden';setStatus('');}catch(e){setStatus(`Madde yüklenemedi: ${e.message}`,true)}}
function stopSpeech(){if(!speechSupported)return;window.speechSynthesis.cancel();if(activeSpeakButton){activeSpeakButton.setAttribute('aria-pressed','false');activeSpeakButton=null}}
function speak(text,lang,button){if(!speechSupported||!text)return;stopSpeech();const utterance=new SpeechSynthesisUtterance(text);utterance.lang=lang;utterance.rate=lang==='en-GB'?.9:.92;utterance.pitch=1;utterance.onend=utterance.onerror=()=>{if(button)button.setAttribute('aria-pressed','false');if(activeSpeakButton===button)activeSpeakButton=null};activeSpeakButton=button;button.setAttribute('aria-pressed','true');window.speechSynthesis.speak(utterance)}
function closeDrawer(){stopSpeech();drawer.classList.remove('open');drawer.setAttribute('aria-hidden','true');document.body.style.overflow=''}
function runSearch(){clearTimeout(searchTimer);currentQuery=queryInput.value.trim();offset=0;load()}
el('searchForm').addEventListener('submit',e=>{e.preventDefault();runSearch()});queryInput.addEventListener('input',()=>{clearTimeout(searchTimer);searchTimer=setTimeout(runSearch,260)});prev.addEventListener('click',()=>{offset=Math.max(0,offset-LIMIT);load();scrollTo({top:0,behavior:'smooth'})});next.addEventListener('click',()=>{offset+=LIMIT;load();scrollTo({top:0,behavior:'smooth'})});document.addEventListener('click',e=>{const speakBtn=e.target.closest('.speak');if(speakBtn){e.preventDefault();e.stopPropagation();speak(speakBtn.dataset.speak,speakBtn.dataset.lang,speakBtn);return}const row=e.target.closest('[data-slug]');if(row)detail(row.dataset.slug)});results.addEventListener('keydown',e=>{if((e.key==='Enter'||e.key===' ')&&e.target.matches('[data-slug]')){e.preventDefault();detail(e.target.dataset.slug)}});el('close').addEventListener('click',closeDrawer);drawer.addEventListener('click',e=>{if(e.target===drawer)closeDrawer()});document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(window.speechSynthesis?.speaking)stopSpeech();else if(drawer.classList.contains('open'))closeDrawer()}});window.addEventListener('beforeunload',stopSpeech);load();
})();
</script>
</body>
</html>
