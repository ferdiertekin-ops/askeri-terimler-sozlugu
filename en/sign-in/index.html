<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,follow"><title>Sign in · Military Terms Dictionary</title><link rel="icon" href="/favicon.ico" sizes="any"><link rel="stylesheet" href="/assets/community-account.css"></head><body data-mode="signin" data-lang="en"><div class="community-shell"><header class="community-topbar"><a class="community-brand" href="/en/"><img src="/ats-logo-2026.svg" alt="ATS"></a><a class="community-back" href="/en/">Back to dictionary</a></header><main class="community-main narrow"><h1 class="community-title">Sign in</h1><p class="community-lead">Access your favourites and personal study area.</p><p class="public-good">You never need to sign in to read the dictionary. Membership only adds personal tools and community participation.</p><section class="community-card"><form id="signinForm"><label class="community-field">Email<input id="email" type="email" autocomplete="email" required maxlength="254"></label><label class="community-field" style="margin-top:13px">Password<input id="password" type="password" autocomplete="current-password" required maxlength="128"></label><div id="turnstileLogin" class="community-turnstile"></div><div class="community-actions"><button class="community-button primary" type="submit">Sign in</button><a class="community-button" href="/en/sign-up/">Join</a></div></form><p id="communityStatus" class="community-status" role="status"></p><details class="community-details"><summary>Resend email verification</summary><form id="resendForm"><label class="community-field" style="margin-top:12px">Email<input id="resendEmail" type="email" required maxlength="254"></label><div id="turnstileResend" class="community-turnstile"></div><button class="community-button" type="submit">Send verification link</button></form></details><details class="community-details"><summary>Forgot my password</summary><form id="resetReque
