<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Cookie Policy · Military Terms Dictionary</title><meta name="description" content="Cookie and local storage statement for the Military Terms Dictionary."><meta name="robots" content="index, follow"><link rel="canonical" href="/en/cookie-policy/"><link rel="icon" href="/favicon.ico" sizes="any"><link rel="icon" type="image/png" href="/favicon-96.png" sizes="96x96"><link rel="apple-touch-icon" href="/apple-touch-icon.png"><style>:root{--bg:#f8f7f4;--paper:#ffffff;--ink:#232d37;--ink-soft:#5b6570;--line:#e4e2da;--accent:#3d5a78;--olive:#3d5a78;--olive-deep:#2b4460;--brass:#3d5a78;--brass-deep:#2b4460}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#f8f7f4 0%,#eeede8 100%);background-attachment:fixed;color:var(--ink);font-family:Cambria,Georgia,serif;font-size:17px;line-height:1.62}.site{width:min(1080px,calc(100% - 32px));margin:0 auto;padding:22px 0 36px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:8px 0 18px}.brand{display:flex;align-items:center;gap:14px;color:var(--ink);text-decoration:none}.brand__logo{width:64px;height:64px;display:block;object-fit:contain;border-radius:50%;filter:drop-shadow(0 4px 10px rgba(32,57,90,.14))}.brand__name{font-size:19px;font-weight:700}.lang-switch{display:inline-flex;gap:4px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.72);padding:3px}.lang-switch a{padding:5px 9px;border-radius:999px;text-decoration:none;color:var(--ink-soft);font-size:12px;font-weight:700;letter-spacing:.04em}.lang-switch a.active{background:var(--olive);color:#f8f7f4}.site-nav{display:flex;flex-wrap:wrap;justify-content:center;gap:9px;margin:0 0 24px}.site-nav a{padding:8px 12px;border:1px solid var(--line);border-radius:999px;text-decoration:none;color:var(--accent);background:rgba(255,255,255,.70)}main{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:30px 36px;box-shadow:0 18px 50px rgba(20,37,54,.06)}h1{font-family:"Palatino Linotype","Book Antiqua",Palatino,Georgia,serif;font-size:34px;line-height:1.15;margin:0 0 16px;text-align:center}h2{font-family:"Palatino Linotype","Book Antiqua",Palatino,Georgia,serif;font-size:24px;margin:28px 0 10px}p{text-align:justify}.lead{text-align:center;color:var(--ink-soft);font-size:18px}.meta{margin-top:30px;padding-top:16px;border-top:1px solid var(--line);color:var(--ink-soft);font-size:13px}.site-footer{margin:26px 0 0;text-align:center;color:var(--ink-soft);font-size:13px}.site-footer p{text-align:center}a{color:var(--accent)}</style></head><body><div class="site"><header class="topbar"><a class="brand" href="/en/" aria-label="Military Terms Dictionary"><img class="brand__logo" src="/ats-logo.png" alt="ATS"><span class="brand__name">Military Terms Dictionary</span></a><nav class="lang-switch" aria-label="Language"><a href="/" lang="tr">TR</a><a href="/en/" class="active" lang="en">ENG</a></nav></header><nav class="site-nav" aria-label="Site links"><a href="/en/">Dictionary</a><a href="/en/terms/">Terms Index</a><a href="/en/publication-note/">Publication Note</a><a href="/en/bibliography/">Bibliography</a><a href="/en/privacy-policy/">Privacy</a><a href="/en/cookie-policy/">Cookies</a><a href="/en/terms-of-use/">Terms of Use</a><a href="/en/contact/">Contact</a></nav><main><h1 id="pageTitle">Cookie Policy</h1><div id="pageBody"><p class="lead">The English cookie policy has not yet been published.</p></div><p class="meta" id="liveMeta">Loading live content.</p></main><footer class="site-footer"><p>© 2026 Ferdi Ertekin · Military Terms Dictionary</p></footer></div><script>
(function(){
  const key = "cerez-politikasi";
  const lang = "en";
  const fallback = "<p class=\"lead\">The English cookie policy has not yet been published.</p>";
  const title = "Cookie Policy";
  const metaLabel = "Live content last updated";
  const titleEl = document.getElementById('pageTitle');
  const bodyEl = document.getElementById('pageBody');
  const metaEl = document.getElementById('liveMeta');
  titleEl.textContent = title;
  bodyEl.innerHTML = fallback;
  fetch('/api/content?ts=' + Date.now(), { cache: 'no-store' })
    .then(r => r.ok ? r.json() : null)
    .then(content => {
      if (!content) throw new Error('live_content_unavailable');
      const pages = lang === 'en' ? (content.pages_en || {}) : (content.pages || {});
      const html = pages[key];
      if (typeof html === 'string' && html.trim()) bodyEl.innerHTML = html;
      const updated = content.updatedAt || (content.meta && content.meta.live_updated_at) || '';
      metaEl.textContent = updated ? (metaLabel + ': ' + updated + '.') : '';
    })
    .catch(() => { metaEl.textContent = ''; });
})();
</script></body></html>
