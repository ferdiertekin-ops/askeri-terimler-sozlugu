<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#2F4E71">
  <title>Askerî Terimler Sözlüğü</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#F7F4EC;color:#2F4E71;font-family:Cambria,Georgia,serif}
    p{font-size:18px;letter-spacing:.02em}
  </style>
</head>
<body>
  <p>Sözlük açılıyor…</p>
  <script>
    (async function () {
      try {
        if ("serviceWorker" in navigator) {
          await navigator.serviceWorker.register("/sw.js", { scope: "/" });
          await navigator.serviceWorker.ready;
        }
      } catch (error) {
        console.error("Service worker kaydı başarısız:", error);
      } finally {
        location.replace("/");
      }
    })();
  </script>
</body>
</html>
