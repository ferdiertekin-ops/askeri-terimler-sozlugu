<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#2F4E71">
  <title>Çevrimdışı | Askerî Terimler Sözlüğü</title>
  <style>
    :root{color-scheme:light;--bg:#F7F4EC;--ink:#1E2732;--soft:#5D6672;--accent:#2F4E71;--line:#C8C2B1}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(180deg,#F7F4EC,#ECE7DB);color:var(--ink);font-family:Cambria,Georgia,serif}
    main{width:min(620px,100%);padding:36px;border:1px solid var(--line);border-radius:14px;background:#FFFEFA;text-align:center;box-shadow:0 18px 50px -35px rgba(30,39,50,.55)}
    h1{margin:0 0 14px;color:var(--accent);font-size:30px}
    p{margin:0;color:var(--soft);font-size:17px;line-height:1.65}
    button{margin-top:24px;min-height:42px;padding:0 18px;border:1px solid #20395A;border-radius:10px;background:var(--accent);color:#fff;font:600 15px Cambria,Georgia,serif;cursor:pointer}
  </style>
</head>
<body>
  <main>
    <h1>Bağlantı bulunamadı</h1>
    <p>Daha önce açılmış sözlük sayfaları çevrimdışı kullanılabilir. İnternet bağlantısı yeniden kurulduğunda güncel maddeler otomatik olarak alınacaktır.</p>
    <button type="button" onclick="location.reload()">Yeniden dene</button>
  </main>
</body>
</html>
