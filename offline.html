<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#20395A">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <title>Çevrimdışı | Askerî Terimler Sözlüğü</title>
  <style>
    :root{color-scheme:light;--bg:#F7F4EC;--bg2:#ECE7DB;--ink:#1E2732;--soft:#5D6672;--accent:#20395A;--gold:#8F702F;--line:#C8C2B1;--card:#FFFEFA}
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100svh;
      display:grid;
      place-items:center;
      padding:max(24px,env(safe-area-inset-top)) 24px max(24px,env(safe-area-inset-bottom));
      background:linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--ink);
      font-family:Cambria,Georgia,serif;
    }
    main{
      width:min(620px,100%);
      padding:38px 32px;
      border:1px solid var(--line);
      border-radius:18px;
      background:var(--card);
      text-align:center;
      box-shadow:0 22px 65px -42px rgba(30,39,50,.65);
    }
    img{width:88px;height:88px;border-radius:20px;box-shadow:0 12px 28px -18px rgba(32,57,90,.65)}
    h1{margin:20px 0 12px;color:var(--accent);font-family:"Palatino Linotype","Book Antiqua",Palatino,Georgia,serif;font-size:30px;font-weight:600}
    p{max-width:480px;margin:0 auto;color:var(--soft);font-size:17px;line-height:1.68}
    .actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:26px}
    button,a{
      min-height:43px;
      padding:11px 18px;
      border:1px solid var(--accent);
      border-radius:10px;
      font:600 15px Cambria,Georgia,serif;
      text-decoration:none;
      cursor:pointer;
    }
    button{background:var(--accent);color:#fff}
    a{background:transparent;color:var(--accent)}
    small{display:block;margin-top:22px;color:var(--gold);font-size:12.5px;letter-spacing:.04em}
  </style>
</head>
<body>
  <main>
    <img src="/icons/ats-icon-192.png" alt="" width="88" height="88">
    <h1>Bağlantı bulunamadı</h1>
    <p>Daha önce açtığınız sözlük ve son alınan sözlük verileri çevrimdışı kullanılabilir. Bağlantı yeniden kurulduğunda güncel içerik otomatik olarak alınacaktır.</p>
    <div class="actions">
      <button type="button" onclick="location.reload()">Yeniden dene</button>
      <a href="/">Önbellekteki sözlüğü aç</a>
    </div>
    <small>Askerî Terimler Sözlüğü · 1876–1918</small>
  </main>
  <script>
    window.addEventListener("online", () => location.reload(), { once: true });
  </script>
</body>
</html>
